name: finalproject
description: "Donation and Emergency Aid App - Pro Version"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  timeago: ^3.6.1
  intl: ^0.20.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  shared_preferences: ^2.5.5
  google_maps_flutter: ^2.17.0
  geolocator: ^14.0.2
  url_launcher: ^6.3.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geocoding: ^4.0.0
  provider: ^6.1.1
  image_picker: ^1.1.2
  firebase_storage: ^13.0.0
  google_generative_ai: ^0.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#DC2626"
  image: "assets/images/logo.png"
  android_12:
    image: "assets/images/logo.png"
    color: "#DC2626"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
